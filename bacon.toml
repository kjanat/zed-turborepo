#:schema https://dystroy.org/bacon/.bacon.schema.json
#:tombi schema.strict = false
#
# bacon configuration for zed-turborepo
# Complete help: https://dystroy.org/bacon/config/

default_job          = "check"
env.CARGO_TERM_COLOR = "always"

# ─────────────────────────────────────────────────────────────────────────────
# Check jobs
# ─────────────────────────────────────────────────────────────────────────────

[jobs.check]
command     = ["cargo", "check", "-p", "turbo-core", "-p", "turbo-mcp", "-p", "turbo-zed"]
need_stdout = false

[jobs.check-all]
command     = ["cargo", "check", "--workspace", "--all-targets"]
need_stdout = false

# ─────────────────────────────────────────────────────────────────────────────
# Clippy jobs
# ─────────────────────────────────────────────────────────────────────────────

[jobs.clippy]
command     = ["cargo", "clippy", "-p", "turbo-core", "-p", "turbo-mcp", "-p", "turbo-zed"]
need_stdout = false

[jobs.clippy-all]
command     = ["cargo", "clippy", "--workspace", "--all-targets"]
need_stdout = false

# ─────────────────────────────────────────────────────────────────────────────
# Test jobs
# ─────────────────────────────────────────────────────────────────────────────

[jobs.test]
command     = ["cargo", "test", "-p", "turbo-core", "-p", "turbo-mcp"]
need_stdout = true

[jobs.nextest]
command     = [
  "cargo",
  "nextest",
  "run",
  "-p",
  "turbo-core",
  "-p",
  "turbo-mcp",
  "--hide-progress-bar",
  "--failure-output",
  "final"
]
need_stdout = true
analyzer    = "nextest"

# ─────────────────────────────────────────────────────────────────────────────
# Documentation jobs
# ─────────────────────────────────────────────────────────────────────────────

[jobs.doc]
command     = ["cargo", "doc", "--no-deps", "-p", "turbo-core", "-p", "turbo-mcp"]
need_stdout = false

[jobs.doc-open]
command     = ["cargo", "doc", "--no-deps", "--open", "-p", "turbo-core"]
need_stdout = false
on_success  = "back"

# ─────────────────────────────────────────────────────────────────────────────
# Build jobs
# ─────────────────────────────────────────────────────────────────────────────

[jobs.build]
command     = ["cargo", "build", "-p", "turbo-core", "-p", "turbo-mcp"]
need_stdout = false

[jobs.build-release]
command     = ["cargo", "build", "--release", "-p", "turbo-mcp"]
need_stdout = false

# Build Zed extension (WASM)
[jobs.build-zed]
command     = ["cargo", "build", "--release", "--target", "wasm32-wasip1", "-p", "turbo-zed"]
need_stdout = false

# ─────────────────────────────────────────────────────────────────────────────
# Run jobs
# ─────────────────────────────────────────────────────────────────────────────

# Run MCP server (for testing with MCP inspector)
[jobs.mcp]
command        = ["cargo", "run", "-p", "turbo-mcp"]
need_stdout    = true
allow_warnings = true
background     = true

# Run MCP server with debug logging
[jobs.mcp-debug]
command        = ["cargo", "run", "-p", "turbo-mcp"]
env            = { RUST_LOG = "debug" }
need_stdout    = true
allow_warnings = true

# ─────────────────────────────────────────────────────────────────────────────
# Keybindings
# ─────────────────────────────────────────────────────────────────────────────

[keybindings]
c = "job:clippy"
a = "job:clippy-all"
t = "job:test"
n = "job:nextest"
b = "job:build-release"
z = "job:build-zed"
m = "job:mcp-debug"
d = "job:doc-open"
