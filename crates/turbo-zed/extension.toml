#:schema https://raw.githubusercontent.com/kjanat/zed-editor/refs/heads/feature/extension-toml-schema/crates/extension_api/schemas/extension.schema.json

id             = "turbo-zed"
name           = "Turborepo"
version        = "0.1.0"
schema_version = 1
authors        = ["Kaj Kowalski <dev@kajkowalski.nl>"]
description    = "Tools and instant feedback for your build system"
repository     = "https://github.com/kjanat/zed-turborepo"

[grammars.json]
repository = "https://github.com/tree-sitter/tree-sitter-json"
rev        = "ee35a6ebefcef0c5c416c0d1ccec7370cfca5a24"         # v0.24.8 (supports comments)

[language_servers.turbo-lsp]
languages         = ["TurboJSON"]
code_action_kinds = ["quickfix"]

[language_servers.turbo-lsp.language_ids]
"TurboJSON" = "json"

[[capabilities]]
kind    = "process:exec"
command = "**"
args    = ["**"]

